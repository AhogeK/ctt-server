# Docker Compose - Local Development Infrastructure
# Provides: PostgreSQL, Redis, Mailpit (SMTP sandbox), CTT Server (app)
# Usage: docker compose up -d
# Prerequisites: Copy .env.example to .env and customize passwords

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_PORT: ${APP_PORT:-8080}
    container_name: ctt-server
    ports:
      - "${APP_EXTERNAL_PORT:-8080}:${APP_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: ${APP_PORT:-8080}
      APP_PORT: ${APP_PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://ctt-postgres:5432/${POSTGRES_DB:-ctt_server}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ctt}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ctt_local_pass}
      SPRING_DATA_REDIS_HOST: ctt-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-ctt_redis_pass}
      SPRING_MAIL_HOST: ctt-mailpit
      SPRING_MAIL_PORT: 1025
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${APP_PORT:-8080}/ctt-server/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  postgres:
    image: postgres:latest
    container_name: ctt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ctt_server}
      POSTGRES_USER: ${POSTGRES_USER:-ctt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ctt_local_pass}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql   # PostgreSQL 18+ requires parent directory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ctt} -d ${POSTGRES_DB:-ctt_server}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: ctt-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-ctt_redis_pass}
    ports:
      - "${REDIS_EXTERNAL_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD:-ctt_redis_pass} redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: ctt-mailpit
    ports:
      - "${MAIL_SMTP_EXTERNAL_PORT:-1025}:1025"   # SMTP — spring.mail.port
      - "${MAIL_UI_EXTERNAL_PORT:-8025}:8025"     # Web UI — http://localhost:8025
    volumes:
      - mailpit_data:/data   # Persistent email storage
    environment:
      MP_DATABASE: /data/mailpit.db          # SQLite database path
      MP_MAX_MESSAGES: 500                   # Max messages to retain (auto-prune older)
      MP_SMTP_AUTH_ACCEPT_ANY: 1             # Accept any username/password
      MP_SMTP_AUTH_ALLOW_INSECURE: 1         # Allow plaintext auth (no TLS required locally)
      MP_UI_AUTH_FILE: ""                    # No web UI authentication (local dev only)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/livez || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
  mailpit_data:
