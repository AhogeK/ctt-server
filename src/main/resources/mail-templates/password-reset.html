<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}">
<!--/*@thymesVar id="username" type="java.lang.String"*/-->
<!--/*@thymesVar id="resetLink" type="java.lang.String"*/-->
<!--/*@thymesVar id="expirationMinutes" type="java.lang.Long"*/-->
<body>
    <h2 style="color: #333333; margin: 0 0 24px 0; font-size: 20px; font-weight: 600;">
        Password Reset Request, <span th:text="${username}">User</span>
    </h2>
    
    <p style="color: #333333; line-height: 1.6; margin: 0 0 24px 0;">
        We received a request to reset your password. Click the button below to reset it.
    </p>
    
    <div style="text-align: center; margin: 32px 0;">
        <a th:href="${resetLink}"
           style="display: inline-block; padding: 14px 32px; background-color: #635BFF; color: #ffffff !important; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 16px;">
            Reset Password
        </a>
    </div>
    
    <p style="color: #666666; font-size: 14px; line-height: 1.6; margin: 24px 0 0 0; text-align: center;">
        This reset link will expire in <strong th:text="${expirationMinutes}">30</strong> minutes.
    </p>
    
    <p style="color: #888888; font-size: 13px; line-height: 1.5; margin: 24px 0 0 0; text-align: center;">
        If you didn't request a password reset, you can safely ignore this email. Your password will remain unchanged.
    </p>
</body>
</html>
