spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ctt_server}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: ${DB_POOL_MIN:5}
      maximum-pool-size: ${DB_POOL_MAX:20}
      connection-timeout: ${DB_CONN_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: ${REDIS_TIMEOUT:2000ms}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX:8}
          max-idle: ${REDIS_POOL_IDLE:8}

  mail:
    host: ${MAIL_SMTP_HOST:smtp.resend.com}
    port: ${MAIL_SMTP_PORT:465}
    username: ${MAIL_SMTP_USERNAME:resend}
    password: ${MAIL_SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Mail configuration for development
ctt:
  mail:
    from:
      address: ${MAIL_FROM_ADDRESS:dev@localhost}
      name: ${MAIL_FROM_NAME:CTT Dev}
    outbox:
      poll-interval-ms: ${MAIL_OUTBOX_POLL_INTERVAL_MS:2000}
      batch-size: ${MAIL_OUTBOX_BATCH_SIZE:5}
      zombie-timeout-seconds: ${MAIL_OUTBOX_ZOMBIE_TIMEOUT_SECONDS:60}
    retry:
      base-delay-seconds: ${MAIL_RETRY_BASE_DELAY_SECONDS:5}
      max-attempts: ${MAIL_RETRY_MAX_ATTEMPTS:3}

logging:
  level:
    root: INFO
    com.ahogek.cttserver: INFO
    org.springframework.security: INFO
