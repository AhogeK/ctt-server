spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ctt_server}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    # When database is not empty but has no flyway_schema_history table,
    # establish baseline from current state
    baseline-on-migrate: true
    baseline-version: 0
    # Prevent concurrent migration locks in multi-node deployments
    validate-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8080
  servlet:
    context-path: /ctt-server

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: ctt-server
    version: 1.0.0

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
