# Test Profile Configuration
# This file is activated by @ActiveProfiles("test") in test base classes.

spring:
  # Flyway configuration for tests (used by @BaseIntegrationTest)
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false  # Allow Flyway clean in test environment only
    baseline-on-migrate: true

  jpa:
    hibernate:
      # Repository tests (@BaseRepositoryTest): Hibernate auto-creates schema for fast iteration
      # Integration tests (@BaseIntegrationTest): Overridden to "validate" to check Flyway schema
      ddl-auto: create-drop
    show-sql: false

  # Mail — GreenMail embedded SMTP (JVM process, no Docker, no real emails).
  # Port is dynamically overridden by GreenMailConfiguration#dynamicProperties().
  mail:
    host: localhost
    port: 0          # placeholder, overridden at runtime
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false

  # Testcontainers @ServiceConnection will override datasource config
  # No need to specify url/username/password here

# Security configuration for tests
ctt:
  security:
    jwt:
      # Test-only secret key (256+ bits for HMAC-SHA256)
      secret-key: "TEST_ONLY_SECRET_KEY_MUST_BE_AT_LEAST_256_BITS_LONG_FOR_HMAC_SHA"
    password:
      # Lower BCrypt rounds for faster tests (4 rounds ≈ 2ms vs 12 rounds ≈ 250ms)
      bcrypt-rounds: 4
    rate-limit:
      # Disable rate limiting in tests to avoid interference
      enabled: false
    oauth:
      frontend-url: "http://localhost:5175"
      # Test-only AES-256 key (Base64-encoded 32 bytes)
      token-encryption-key: "L4QmQcZ4IuNPd0Q4rWRqoB33oOASs9As3pFAkdNIOs8="
      github:
        client-id: "test-client-id"
        client-secret: "test-client-secret"
        token-uri: "https://github.com/login/oauth/access_token"
        user-info-uri: "https://api.github.com/user"
        user-emails-uri: "https://api.github.com/user/emails"
        scope: "read:user,user:email"

  # Mail configuration for tests
  mail:
    from:
      address: test@localhost
      name: CTT Test
    outbox:
      # Disable outbox scheduler in tests (use very large interval)
      poll-interval-ms: 999999999
      batch-size: 10
      zombie-timeout-seconds: 30
    retry:
      base-delay-seconds: 1
      multiplier: 1.0
      max-delay-seconds: 5
      max-attempts: 2
    frontend:
      base-url: http://localhost:5175
      verify-email-path: /auth/verify-email
      reset-password-path: /auth/reset-password