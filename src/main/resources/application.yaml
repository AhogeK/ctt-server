spring:
  application:
    name: ctt-server

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    # Import .env file for local development (optional, skipped if not found)
    import: optional:file:.env[.properties]

  lifecycle:
    timeout-per-shutdown-phase: 30s

  jackson:
    time-zone: UTC
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /ctt-server
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ctt-server
    version: ${APP_VERSION:0.0.1-SNAPSHOT}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

ctt:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:LOCAL_DUMMY_SECRET_KEY_MUST_BE_AT_LEAST_256_BITS_LONG}
      issuer: "ctt-identity-provider"
      access-token-ttl: 15m
      refresh-token-ttl-plugin: 14d
      refresh-token-ttl-web: 30d

    password:
      bcrypt-rounds: 12
      max-failed-attempts: 5
      lock-duration: 30m

    rate-limit:
      enabled: true
      global-max-requests-per-second: 200

    audit:
      log-payloads: true
      masked-fields:
        - password
        - passwordConfirm
        - oldPassword
        - token
        - access_token
        - refresh_token
        - secret
        - key
