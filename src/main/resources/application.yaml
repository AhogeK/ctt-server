spring:
  application:
    name: ctt-server

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    # Import .env file for local development (optional, skipped if not found)
    import: optional:file:.env[.properties]

  lifecycle:
    timeout-per-shutdown-phase: 30s

  mail:
    host: ${MAIL_SMTP_HOST:localhost}
    port: ${MAIL_SMTP_PORT:1025}
    username: ${MAIL_SMTP_USERNAME:}
    password: ${MAIL_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  jackson:
    time-zone: UTC
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /ctt-server
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ctt-server
    version: @appVersion@

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

ctt:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:LOCAL_DUMMY_SECRET_KEY_MUST_BE_AT_LEAST_256_BITS_LONG}
      issuer: "ctt-identity-provider"
      access-token-ttl: 15m
      refresh-token-ttl-plugin: 14d
      refresh-token-ttl-web: 30d

    password:
      bcrypt-rounds: 12
      max-failed-attempts: 5
      lock-duration: 30m
      failure-window-seconds: 900  # 15 minutes sliding window
      retention-duration: PT720H  # 30 days - how long to keep login attempt records
      storage: DB  # or REDIS for distributed systems

    rate-limit:
      enabled: true
      global-max-requests-per-second: 200

    audit:
      log-payloads: true
      masked-fields:
        - password
        - passwordConfirm
        - oldPassword
        - token
        - access_token
        - refresh_token
        - secret
        - key

    oauth:
      token-encryption-key: "${OAUTH_TOKEN_ENCRYPTION_KEY:L4QmQcZ4IuNPd0Q4rWRqoB33oOASs9As3pFAkdNIOs8=}"

  mail:
    from:
      address: ${MAIL_FROM_ADDRESS:noreply@localhost}
      name: ${MAIL_FROM_NAME:CTT Server}

    outbox:
      # Polling interval for outbox table (milliseconds)
      poll-interval-ms: ${MAIL_OUTBOX_POLL_INTERVAL_MS:5000}
      # Maximum emails to fetch and send per batch
      batch-size: ${MAIL_OUTBOX_BATCH_SIZE:50}
      # Timeout in seconds to reset stuck SENDING emails to PENDING
      zombie-timeout-seconds: ${MAIL_OUTBOX_ZOMBIE_TIMEOUT_SECONDS:300}
      # Interval for zombie recovery task (milliseconds)
      zombie-interval-ms: ${MAIL_OUTBOX_ZOMBIE_INTERVAL_MS:120000}

    retry:
      # Base delay in seconds for first retry
      base-delay-seconds: ${MAIL_RETRY_BASE_DELAY_SECONDS:10}
      # Exponential backoff multiplier (base * multiplier^n)
      multiplier: ${MAIL_RETRY_MULTIPLIER:2.0}
      # Maximum delay cap in seconds
      max-delay-seconds: ${MAIL_RETRY_MAX_DELAY_SECONDS:3600}
      # Maximum retry attempts before marking as CANCELLED
      max-attempts: ${MAIL_RETRY_MAX_ATTEMPTS:5}
      # Jitter factor for retry time randomization (0.1 = ±10%)
      jitter-factor: ${MAIL_RETRY_JITTER_FACTOR:0.1}

    frontend:
      base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
