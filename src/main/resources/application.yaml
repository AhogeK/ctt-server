spring:
  application:
    name: ctt-server

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  jackson:
    time-zone: UTC
    default-property-inclusion: non_null

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /ctt-server
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ctt-server
    version: ${APP_VERSION:0.0.1-SNAPSHOT}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
